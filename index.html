<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="keywords" content="梅登黑德网格, Maidenhead Grid, 经纬度, 业余无线电, AMap, 高德地图, 网格定位">
    <meta name="description" content="交互式梅登黑德网格 (Maidenhead Grid) 工具：点击地图或输入经纬度即可查看网格、坐标与缩放等级，支持定位与复制信息。">
    <title>梅登黑德网格定位 | 欢哥科技</title>
    <link
        href="https://fonts.loli.net/css2?family=Space+Grotesk:wght@400;500;600&family=Noto+Sans+SC:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        display: ['Space Grotesk', 'Noto Sans SC', 'sans-serif'],
                    },
                    colors: {
                        midnight: '#0b1221',
                        neon: '#70f3ff',
                        amber: '#fbbf24',
                    },
                    boxShadow: {
                        glow: '0 25px 70px rgba(112, 243, 255, 0.20)',
                    }
                }
            }
        }
    </script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=6f025e700cbacbb0bb866712d20bb35c"></script>
    <script src="AMap.Maidenhead.js"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-midnight via-slate-900 to-slate-950 text-slate-100 font-display">
  <div class="max-w-7xl mx-auto p-3 sm:p-4 space-y-4">
    <header class="flex flex-col gap-2">
            <div class="text-sm uppercase tracking-[0.3em] text-slate-400">Ham · Maidenhead Locator System</div>
            <div class="flex items-baseline gap-3">
                <h1 class="text-3xl md:text-4xl font-semibold text-white">梅登黑德网格定位</h1>
            </div>
            <p class="text-slate-300 max-w-3xl">梅登黑德定位系统是以经纬度作为基准线，将地球分为若干网格，以实现精确报告自己位置的系统。</p>
        </header>

    <div class="flex flex-col lg:flex-row gap-4">
      <div class="flex-[4] min-h-[68vh]">
        <div id="map" class="h-[68vh] md:h-[78vh] rounded-2xl border border-slate-800 bg-slate-900 shadow-glow"></div>
            </div>
            <div class="flex-[1] w-full lg:max-w-xs space-y-4">
                <div class="p-4 rounded-2xl border border-slate-800 bg-slate-900/80 backdrop-blur space-y-4">
                    <div class="flex items-center justify-between">
                        <div>
                            <h2 class="text-lg font-semibold text-white">功能面板</h2>
                            <p class="text-xs text-slate-400">地图、定位与网格查询</p>
                        </div>
                    </div>

                    <div class="space-y-3">
                        <div class="grid grid-cols-2 gap-3">
                            <button id="btnLocate"
                                class="flex items-center justify-center gap-2 px-3 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-sm font-medium border border-slate-700">当前位置</button>
                            <button id="btnReset"
                                class="flex items-center justify-center gap-2 px-3 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-sm font-medium border border-slate-700">重置视图</button>
                        </div>

                        <div class="space-y-2">
                            <label class="text-xs text-slate-400">经纬度输入</label>
                            <div class="grid grid-cols-2 gap-3">
                                <input id="lngInput" type="number" step="0.000001" placeholder="116.391"
                                    class="w-full px-3 py-2 text-sm rounded-xl bg-slate-800 border border-slate-700 focus:border-neon focus:outline-none" />
                                <input id="latInput" type="number" step="0.000001" placeholder="39.907"
                                    class="w-full px-3 py-2 text-sm rounded-xl bg-slate-800 border border-slate-700 focus:border-neon focus:outline-none" />
                            </div>
                            <button id="btnGo"
                                class="w-full px-3 py-2 rounded-xl bg-neon text-midnight font-semibold hover:brightness-95">定位到坐标</button>
                        </div>

                        <div class="space-y-2">
                            <label class="text-xs text-slate-400">网格定位（Maidenhead）</label>
                            <input id="gridInput" type="text" maxlength="8" placeholder="OM89RK"
                                class="w-full px-3 py-2 text-sm rounded-xl bg-slate-800 border border-slate-700 focus:border-neon focus:outline-none uppercase" />
                            <button id="btnGridGo"
                                class="w-full px-3 py-2 rounded-xl bg-amber text-slate-900 font-semibold hover:brightness-95">定位到网格中心</button>
                            <p class="text-[11px] text-slate-500 leading-tight">支持 4/6 位网格（如 OM89、OM89RK），自动跳转至对应网格中心点。</p>
                        </div>
                    </div>
                </div>

                <div class="p-4 rounded-2xl border border-slate-800 bg-slate-900/80 backdrop-blur space-y-3">
                    <div class="flex items-center justify-between">
                        <h2 class="text-lg font-semibold text-white">实时信息</h2>
                    </div>
                    <div class="space-y-2 text-sm">
                        <div class="flex items-center gap-2 border-b border-slate-800 pb-2">
                            <span class="text-slate-400">经度</span>
                            <div class="flex items-center gap-2 ml-auto">
                                <span id="lngDisplay" class="font-mono">--</span>
                                <button data-copy="lngDisplay"
                                    class="px-2 py-1 text-[11px] rounded-lg bg-slate-800 border border-slate-700 hover:border-neon">复制</button>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 border-b border-slate-800 pb-2">
                            <span class="text-slate-400">纬度</span>
                            <div class="flex items-center gap-2 ml-auto">
                                <span id="latDisplay" class="font-mono">--</span>
                                <button data-copy="latDisplay"
                                    class="px-2 py-1 text-[11px] rounded-lg bg-slate-800 border border-slate-700 hover:border-neon">复制</button>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 border-b border-slate-800 pb-2">
                            <span class="text-slate-400">梅登黑德网格</span>
                            <div class="flex items-center gap-2 ml-auto">
                                <span id="gridDisplay" class="font-mono text-neon">--</span>
                                <button data-copy="gridDisplay"
                                    class="px-2 py-1 text-[11px] rounded-lg bg-slate-800 border border-slate-700 hover:border-neon">复制</button>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 border-b border-slate-800 pb-2">
                            <span class="text-slate-400">地图缩放等级</span>
                            <div class="flex items-center gap-2 ml-auto">
                                <span id="zoomDisplay" class="font-mono">--</span>
                                <button data-copy="zoomDisplay"
                                    class="px-2 py-1 text-[11px] rounded-lg bg-slate-800 border border-slate-700 hover:border-neon">复制</button>
                            </div>
                        </div>
                        <div class="flex items-center gap-2 border-b border-slate-800 pb-2">
                            <span class="text-slate-400">项目地址</span>
                            <div class="flex items-center gap-2 ml-auto">
                                <a href="https://github.com/muzihuaner/Maidenhead-Locator-Grid" class="font-mono">Github</a>
                            </div>
                        </div>
                    </div>
                    <p class="text-xs text-slate-400 leading-relaxed">提示：点击地图或拖动标记可更新坐标与网格。</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let map, marker, geolocation = null;

        function maidenhead(lat, lon) {
            const adjLon = lon + 180;
            const adjLat = lat + 90;
            if (adjLon < 0 || adjLat < 0 || adjLon >= 360 || adjLat >= 180) return 'Invalid';

            const fieldLon = Math.floor(adjLon / 20);
            const fieldLat = Math.floor(adjLat / 10);

            const squareLon = Math.floor((adjLon % 20) / 2);
            const squareLat = Math.floor(adjLat % 10);

            const subLon = Math.floor(((adjLon % 2) / (2 / 24)));
            const subLat = Math.floor(((adjLat % 1) / (1 / 24)));

            const letters = 'ABCDEFGHIJKLMNOPQR';
            const subs = 'ABCDEFGHIJKLMNOPQRSTUVWX';

            return `${letters[fieldLon]}${letters[fieldLat]}${squareLon}${squareLat}${subs[subLon]}${subs[subLat]}`;
        }

        function maidenheadToLatLng(grid) {
            if (!grid) return null;
            const locator = grid.trim().toUpperCase();
            if (locator.length % 2 !== 0 || (locator.length !== 4 && locator.length !== 6)) return null;

            const fieldLetters = 'ABCDEFGHIJKLMNOPQR'; // 18
            const subLetters = 'ABCDEFGHIJKLMNOPQRSTUVWX'; // 24

            const fLon = fieldLetters.indexOf(locator[0]);
            const fLat = fieldLetters.indexOf(locator[1]);
            if (fLon < 0 || fLat < 0) return null;

            let lon = -180 + fLon * 20;
            let lat = -90 + fLat * 10;
            let cellLon = 20, cellLat = 10; // 当前单元尺寸

            if (locator.length >= 4) {
                const sLon = parseInt(locator[2], 10);
                const sLat = parseInt(locator[3], 10);
                if (Number.isNaN(sLon) || Number.isNaN(sLat)) return null;
                lon += sLon * 2;
                lat += sLat * 1;
                cellLon = 2;
                cellLat = 1;
            }

            if (locator.length >= 6) {
                const subLon = subLetters.indexOf(locator[4]);
                const subLat = subLetters.indexOf(locator[5]);
                if (subLon < 0 || subLat < 0) return null;
                const unitLon = 2 / 24;
                const unitLat = 1 / 24;
                lon += subLon * unitLon;
                lat += subLat * unitLat;
                cellLon = unitLon;
                cellLat = unitLat;
            }

            // 若有更细分 (8位数字) 可在此继续扩展，这里暂不实现

            // 返回网格中心点
            return {
                lng: lon + cellLon / 2,
                lat: lat + cellLat / 2,
            };
        }

        function updateInfo(lnglat) {
            const lng = lnglat.lng;
            const lat = lnglat.lat;
            document.getElementById('lngDisplay').textContent = lng.toFixed(6);
            document.getElementById('latDisplay').textContent = lat.toFixed(6);
            document.getElementById('gridDisplay').textContent = maidenhead(lat, lng);
            document.getElementById('zoomDisplay').textContent = map.getZoom().toFixed(1);
            document.getElementById('lngInput').value = lng.toFixed(6);
            document.getElementById('latInput').value = lat.toFixed(6);
        }

        function setMarker(lnglat) {
            if (!marker) {
                marker = new AMap.Marker({ draggable: true, cursor: 'move' });
                marker.on('dragend', (e) => {
                    updateInfo(e.lnglat);
                });
                marker.on('dragging', (e) => updateInfo(e.lnglat));
            }
            marker.setMap(map);
            marker.setPosition(lnglat);
        }

        function moveTo(lnglat, zoom = null) {
            setMarker(lnglat);
            if (zoom) map.setZoomAndCenter(zoom, lnglat);
            else map.setCenter(lnglat);
            updateInfo(lnglat);
        }

        function initMap() {
            map = new AMap.Map('map', {
                zoom: 4,
                center: [105.0, 35.0],
                viewMode: '2D',
                mapStyle: 'amap://styles/whitesmoke',
            });
            const maidenheadGrid = new Maidenhead({
                color: 'rgba(0, 100, 255, 0.5)' // 自定义颜色
            });
            maidenheadGrid.addTo(map);

            AMap.plugin(['AMap.ToolBar', 'AMap.Scale', 'AMap.Geolocation', 'AMap.ControlBar'], () => {
                map.addControl(new AMap.ToolBar({ position: 'LT' }));
                map.addControl(new AMap.Scale());
                map.addControl(new AMap.ControlBar({ position: { top: '10px', right: '10px' } }));

                geolocation = new AMap.Geolocation({
                    enableHighAccuracy: true,
                    zoomToAccuracy: true,
                    buttonPosition: 'RB',
                    buttonOffset: new AMap.Pixel(10, 20),
                });
                map.addControl(geolocation);
            });

            map.on('click', (e) => {
                moveTo(e.lnglat);
            });

            map.on('zoomend', () => {
                document.getElementById('zoomDisplay').textContent = map.getZoom().toFixed(1);
            });

            // 初始化到北京天安门
            const initPos = new AMap.LngLat(116.397389, 39.908722);
            moveTo(initPos, 12);
            document.getElementById('zoomDisplay').textContent = map.getZoom().toFixed(1);
        }

        function locateMe() {
            if (!geolocation) return;
            geolocation.getCurrentPosition((status, result) => {
                if (status === 'complete' && result.position) {
                    moveTo(result.position, 15);
                } else {
                    alert('定位失败，请检查浏览器定位权限');
                }
            });
        }

        function gotoInput() {
            const lng = parseFloat(document.getElementById('lngInput').value);
            const lat = parseFloat(document.getElementById('latInput').value);
            if (Number.isFinite(lng) && Number.isFinite(lat)) {
                moveTo(new AMap.LngLat(lng, lat), 12);
            } else {
                alert('请输入有效的经纬度');
            }
        }

        function gotoGrid() {
            const grid = document.getElementById('gridInput').value;
            const pos = maidenheadToLatLng(grid);
            if (pos) {
                moveTo(new AMap.LngLat(pos.lng, pos.lat), 10);
            } else {
                alert('请输入有效的 4 或 6 位网格（如 OM89 / OM89RK）');
            }
        }

        function resetView() {
            map.setZoomAndCenter(4, [105.0, 35.0]);
        }

        function setupCopyButtons() {
            const buttons = document.querySelectorAll('[data-copy]');
            buttons.forEach((btn) => {
                btn.addEventListener('click', () => {
                    const targetId = btn.getAttribute('data-copy');
                    const el = document.getElementById(targetId);
                    const text = el ? el.textContent.trim() : '';
                    if (!text) return;
                    navigator.clipboard.writeText(text).then(() => {
                        const original = btn.textContent;
                        btn.textContent = '已复制';
                        btn.classList.add('border-neon', 'text-neon');
                        setTimeout(() => {
                            btn.textContent = original;
                            btn.classList.remove('border-neon', 'text-neon');
                        }, 1200);
                    }).catch(() => alert('复制失败，请检查浏览器权限'));
                });
            });
        }

        function toggleTheme() {
            mapStyleKey = mapStyleKey === 'light' ? 'dark' : 'light';
            map.setMapStyle(mapStyles[mapStyleKey]);
            document.getElementById('themeLabel').textContent = mapStyleKey === 'light' ? '白天模式' : '夜间模式';
        }

        window.onload = () => {
            initMap();
            document.getElementById('btnLocate').addEventListener('click', locateMe);
            document.getElementById('btnGo').addEventListener('click', gotoInput);
            document.getElementById('btnGridGo').addEventListener('click', gotoGrid);
            document.getElementById('btnReset').addEventListener('click', resetView);
            document.getElementById('gridInput').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') gotoGrid();
            });
            setupCopyButtons();
        }
    </script>
</body>

</html>
